name: "Lecture Planning Pipeline"
description: "강의 기획 워크플로우 (Planner Team) ⚠️ MUST ANALYZE CONTEXT: If a local folder is provided, analyze its contents using list_dir/read_file BEFORE proceeding."
version: "3.0"

output_path: "{YYYY-MM-DD_강의제목}/01_Planning/강의구성안.md"
max_retries: 2  # step_8 반려 시 step_3부터 재실행 최대 횟수

logging:
  enabled: true
  protocol: ".agent/logging-protocol.md"
  model_config: ".opencode/oh-my-opencode.jsonc"
  path: ".agent/logs/{YYYY-MM-DD}_01_Lecture_Planning.jsonl"
  format: "jsonl"
  # ── 로깅 강제 정책 (MANDATORY) ────────────────────────────────────────
  # A0 오케스트레이터는 각 step 실행 시 반드시 아래 훅을 실행합니다.
  # {step_id}, {agent}, {category}, {action}은 해당 step 정의에서 자동 치환됩니다.
  step_hooks:
    init: "RUN_ID=$(python3 .agent/scripts/agent_logger.py init --workflow 01_Lecture_Planning)"
    pre_step: |
      python3 .agent/scripts/agent_logger.py start \
        --workflow 01_Lecture_Planning --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --input-bytes {input_bytes}
    post_step: |
      python3 .agent/scripts/agent_logger.py end \
        --workflow 01_Lecture_Planning --run-id $RUN_ID \
        --step-id {step_id} --output-bytes {output_bytes}
    on_fail: |
      python3 .agent/scripts/agent_logger.py fail \
        --workflow 01_Lecture_Planning --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --error "{error_message}"
    on_decision: |
      python3 .agent/scripts/agent_logger.py decision \
        --workflow 01_Lecture_Planning --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --decision {decision}
    on_retry: |
      python3 .agent/scripts/agent_logger.py retry \
        --workflow 01_Lecture_Planning --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --retry {retry_count}
  enforcement: |
    ⚠️ 로깅은 step 실행의 전제조건입니다. 생략 시 A5A QA에서 반려됩니다.
    - init: 파이프라인 최초 실행 시 1회 (RUN_ID 생성)
    - pre_step: 각 step 실행 직전 (START 기록)
    - post_step: 각 step 실행 직후 (END 기록)
    - on_fail/on_decision/on_retry: 해당 이벤트 발생 시
    모든 step은 반드시 [pre_step → step 실행 → post_step] 3단계로 실행합니다.

# 모델 라우팅: .agent/AGENTS.md §Per-Agent Model Routing 참조

steps:
  # Phase 1: 순차 실행 — 스코프 정의 → 트렌드 리서치 → 학습자 분석 → 커리큘럼 설계
  
  # ⚠️ Note on NotebookLM Execution (Critical)
  # Step 1 (A1_Trend_Researcher) requires NotebookLM URL execution.
  # Due to subagent limitations (skill() tool not accessible), the NotebookLM 
  # queries should be executed by the Main Agent before delegating to A1, 
  # OR A1 must use bash() tool to execute commands directly.
  # See: .agent/agents/01_planner/A1_Trend_Researcher.md §🔴 CRITICAL
  - id: step_0_scope
    agent: "01_planner/A0_Orchestrator"
    action: "analyze_request"
    input: "User Prompt, Lecture Topic File (Optional), Reference Folder (Optional), NotebookLM URL (Optional), Output Language: Korean"
    output: "Scope Definition & Agent Task Beliefs"
    notes: |
      사용자 요청을 분석하여 스코프를 정의하고 에이전트 작업을 분배합니다.
      ⚠️ 입력 완전성 검사: 8개 항목 파싱 → 부분/빈 입력 시 brainstorming 폴백 실행 (A0_Orchestrator.md §Phase 2 참조).
      ⚠️ 참고자료 연동: 참고자료 폴더 지정 시 Quick Scan → brainstorming → Full Analysis 3-Phase 실행.
      ⚠️ 참고자료 미지정 시: 주제 확정 후 A1에게 딥리서치로 전면 수집 지시.

  - id: step_1_trend_analysis
    agent: "01_planner/A1_Trend_Researcher"
    action: "research_trend"
    depends_on: "step_0_scope"
    input: "Scope Definition, Output Language: Korean"
    output: "Trend Report & Fact Packet (01_Planning/Trend_Report.md)"
    notes: |
      ⚠️ NotebookLM Execution: A1 must execute bash commands to run notebooklm queries.
      Verification: Check Trend_Report.md contains "Query 1/2/3" with actual stdout.
      On Failure: A0 must reject and retry step_1_trend_analysis (see A0_Orchestrator.md §🔴 A1 검증 프로토콜)
      📊 External Tool Logging: A1 must log each NotebookLM query to .agent/logs/{DATE}_01_Lecture_Planning.jsonl using EXTERNAL_TOOL_START/END events (see logging-protocol.md §9.7)

  - id: step_2_learner_analysis
    agent: "01_planner/A5B_Learner_Analyst"
    action: "analyze_learner"
    depends_on: "step_1_trend_analysis"
    input: "Scope Definition, Trend Report, Output Language: Korean"
    output: "Learner Persona & Pain Points (01_Planning/강의구성안.md 내 학습자 분석 섹션)"

  - id: step_3_curriculum_design
    agent: "01_planner/A3_Curriculum_Architect"
    action: "design_structure"
    depends_on: "step_2_learner_analysis"
    input: "Learner Persona, Scope Definition, Trend Report, Output Language: Korean"
    output: "Curriculum Structure Draft (01_Planning/강의구성안.md 초안)"
    notes: |
      50분 단위 세션(쉬는 시간 10분)으로 커리큘럼 초안 설계. 4시간 이상 또는 다일 강의 시 AM/PM 분할 필수.
      ⚠️ 반드시 01_Planning/강의구성안.md 파일로 저장할 것 (step_2의 학습자 분석 섹션 유지).
      이 초안은 step_4, step_5의 병렬 작업 후 step_6에서 통합됩니다.

  # Phase 2: 병렬 실행 — A2와 A7은 서로 의존성 없이 동시 실행 가능
  - id: step_4_instructional_design
    agent: "01_planner/A2_Instructional_Designer"
    action: "design_activities"
    parallel: true  # ← A7과 병렬 실행
    depends_on: "step_3_curriculum_design"
    input: 
      - "Curriculum Structure"
      - "Learner Persona"
      - "Output Language: Korean"
    output: "Learning Activities & Assessment Plan (01_Planning/강의구성안.md 내 활동 섹션)"
    notes: |
      각 세션별 학습 활동 설계.

  - id: step_5_differentiation
    agent: "01_planner/A7_Differentiation_Advisor"
    action: "identify_usp"
    parallel: true  # ← A2와 병렬 실행
    depends_on: "step_3_curriculum_design"
    input: 
      - "Curriculum Structure"
      - "Trend Report"
      - "Output Language: Korean"
    output: "Differentiation Strategy (USP) per session"

  # Phase 3: 통합 — A3가 A2+A7 산출물을 커리큘럼에 병합
  - id: step_6_integration
    agent: "01_planner/A3_Curriculum_Architect"
    action: "integrate_outputs"
    depends_on:
      - "step_4_instructional_design"
      - "step_5_differentiation"
    input: 
      - "Curriculum Structure (Skeleton)"
      - "Learning Activities (A2)"
      - "Differentiation Strategy (A7)"
      - "Output Language: Korean"
    output: "Integrated Curriculum Plan (Complete)"
    notes: |
      A2, A7 산출물을 커리큘럼 초안에 통합하여 최종 강의구성안 완성.

  # Phase 4: QA — 통합된 커리큘럼 검증
  - id: step_7_qa_review
    agent: "01_planner/A5A_QA_Manager"
    action: "verify_plan"
    depends_on: "step_6_integration"
    input: 
      - "Integrated Curriculum Plan"
      - "Output Language: Korean"
    output: "QA Report & Final Curriculum Plan"
    qa_criteria:
      - "세션별 학습 목표 정렬 여부"
      - "시간 총합 정합성"
      - "세션 간 논리적 연결성"
      - "용어/포맷 일관성"
      - "완결성 (외부 의존 없이 교안 작성 가능 여부)"
    notes: |
      통합 커리큘럼의 품질 검증:
      1. 각 세션의 학습 목표가 전체 목표와 정렬되는가?
      2. 시간 배분이 적절한가?
      3. 세션 간 논리적 흐름이 자연스러운가?

  # Phase 5: 최종 승인/반려
  - id: step_8_final_approval
    agent: "01_planner/A0_Orchestrator"
    action: "approve_deliverable"
    depends_on: "step_7_qa_review"
    input: 
      - "Final Curriculum Plan"
      - "QA Report"
      - "Output Language: Korean"
    output: "Approved Lecture Plan"
    decision:
      approved: 
        action: "Finish"
        save_targets:
          - "01_Planning/강의구성안.md"
          - "01_Planning/Trend_Report.md"
      rejected: 
        action: "Retry from step_3_curriculum_design"
        max_retries: 2

# ── 다운스트림 연동 ──────────────────────────────────────────
downstream_integration:
  # 02_Material_Writing 연동
  material_writing:
    input_format: "session_based"
    plan_file: "01_Planning/강의구성안.md"
    notes: |
      02_Material_Writing은 강의구성안.md 기반으로 세션별 교안을 작성합니다.
