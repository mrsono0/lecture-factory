name: "Material Writing Pipeline - Session-Based Aggregation"
description: "세션별 개별 집필 후 취합하는 교안 작성 워크플로우 (Writer Team) ⚠️ MUST ANALYZE CONTEXT: If a local folder is provided, analyze its contents using list_dir/read_file BEFORE proceeding."
version: "6.0"

output_path: "{YYYY-MM-DD_강의제목}/02_Material/강의교안_v2.1.md"
max_retries: 2

# ── 세션 기반 집필 정책 ──────────────────────────────────────────
session_writing_policy:
  enabled: true
  input_format: "session_based"
  
  # 입력 파일 위치
  input_sources:
    curriculum_plan: "01_Planning/강의구성안.md"
    trend_report: "01_Planning/Trend_Report.md"
    reference_materials: "참고자료/"
  
  # 출력 구조
  output_structure:
    individual_sessions: "02_Material/sessions/세션-{번호:03d}-{제목}_v1.0.md"
    aggregated_material: "02_Material/강의교안_v2.1.md"
    visual_specs: "02_Material/visual_specs/"
    packets: "02_Material/packets/"
    reports: "02_Material/reports/"
  
  # 세션 집필 최적화 설정
  session_optimized:
    session_duration: "50min"
    estimated_chars: "no_limit"
    min_chars_per_session: null
    max_chars_per_session: null
    structure: "4_to_7_section_by_chunk_type"
    writing_style: "continuous_prose"  # 개조식 금지, 서술형 필수
    tone: "friendly_spoken_korean"   # ~해요, ~입니다
    
  rules:
    - "단일 세션 집중: 각 에이전트는 1개의 세션만 처리"
    - "개별 파일 출력: 각 세션은 독립된 완성된 교안 파일로 저장"
    - "청크 타입별 4~7섹션 구조 필수: lab/code 7섹션, narrative/diagram 4섹션 필수+3섹션 선택"
    - "분량 무제한: 교육적 완결성이 최우선, 글자 수 제한 없음"
    - "서술형 강제: 개조식 요약 금지, 긴 줄글 서술형 필수"
    - "브릿지 노트: 세션 간 연결성을 위한 전환 멘트 포함"

  # ── 3-Source Mandatory 데이터 수집 정책 ─────────────────────────
  data_collection_policy:
    mode: "3_source_mandatory"
    collection_unit: "Day"  # Day 단위 수집 → 세션별 분배
    description: "3개 소스를 독립적으로 수집하고 세션별 팩트 패킷으로 통합"
    
    sources:
      source_a_local:
        name: "로컬 참고자료"
        required: false  # 로컬에 자료가 없을 수도 있음
        method: "📚 참고자료 매핑 기반 세션 타겟 추출"
        input: "강의구성안 세션별 📚 참고자료 매핑 + 참고자료/ 폴더"
        
      source_b_notebooklm:
        name: "NotebookLM"
        required: "conditional"  # URL 제공 시 필수
        method: "Day별 심화 질의 (5회 수집 → 세션별 분배)"
        note: "트렌드 리포트용이 아닌 강의 콘텐츠 소스로 활용"
        
      source_c_deep_research:
        name: "딥리서치"
        required: true  # 항상 필수
        method: "웹 전체 대상 심층 탐색"
        
    fact_packet_structure:
      per_session:
        - "local_excerpt: 로컬 참고자료 발췌 (있는 경우)"
        - "notebooklm: NotebookLM 질의 결과"
        - "deep_research: 딥리서치 결과"
        - "source_status: {local: found|not_found, notebooklm: collected|skipped, deep_research: collected}"
        - "synthesis: 3-Source 교차 검증 통합 요약"

logging:
  enabled: true
  protocol: ".agent/logging-protocol.md"
  model_config: ".opencode/oh-my-opencode.jsonc"
  path: ".agent/logs/{YYYY-MM-DD}_02_Material_Writing.jsonl"
  format: "jsonl"
  # ── 로깅 강제 정책 (MANDATORY) ────────────────────────────────────────
  # A0 오케스트레이터는 각 step 실행 시 반드시 아래 훅을 실행합니다.
  # {step_id}, {agent}, {category}, {action}은 해당 step 정의에서 자동 치환됩니다.
  step_hooks:
    init: "RUN_ID=$(python3 .agent/scripts/agent_logger.py init --workflow 02_Material_Writing)"
    pre_step: |
      python3 .agent/scripts/agent_logger.py start \
        --workflow 02_Material_Writing --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --input-bytes {input_bytes}
    post_step: |
      python3 .agent/scripts/agent_logger.py end \
        --workflow 02_Material_Writing --run-id $RUN_ID \
        --step-id {step_id} --output-bytes {output_bytes}
    on_fail: |
      python3 .agent/scripts/agent_logger.py fail \
        --workflow 02_Material_Writing --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --error "{error_message}" --retry {retry}
    on_decision: |
      python3 .agent/scripts/agent_logger.py decision \
        --workflow 02_Material_Writing --run-id $RUN_ID \
        --step-id {step_id} --agent {agent} --category {category} \
        --action {action} --decision {decision}
  enforcement: |
    ⚠️ 로깅은 step 실행의 전제조건입니다. 생략 시 QA에서 반려됩니다.
    - init: 파이프라인 최초 실행 시 1회 (RUN_ID 생성)
    - pre_step: 각 step 실행 직전 (START 기록)
    - post_step: 각 step 실행 직후 (END 기록)
    - on_fail/on_decision: 해당 이벤트 발생 시
    모든 step은 반드시 [pre_step → step 실행 → post_step] 3단계로 실행합니다.

steps:
  # Phase 1: 3-Source Mandatory 소스 수집 및 구조화
  - id: step_1_source_mining
    agent: "02_writer/A1_Source_Miner"
    action: "extract_facts_3source"
    input: 
      - "강의구성안 (01_Planning/강의구성안.md)"
      - "Reference Materials (참고자료/ — 있는 경우)"
      - "NotebookLM URL (제공 시 필수 실행)"
      - "Deep Research (항상 필수 실행)"
      - "Output Language: Korean"
    output: "3-Source Fact Packet (세션별 통합 팩트)"
    notes: |
      🔄 3-Source Mandatory: 3개 소스를 독립 수집 후 세션별 통합
        - Source A (로컬): _reference_mapping.json 기반 타겟 추출 (없을 수 있음)
        - Source B (NotebookLM): URL 제공 시 Day별 심화 질의 필수
        - Source C (딥리서치): 항상 필수 실행
      ⚠️ 충분성 판단 없음: 각 소스는 독립적으로 수집, 상호 대체하지 않음
      📊 External Tool Logging: A1_Source_Miner must log all external tool calls
      (notebooklm, deep-research, context7, firecrawl, pdf-official) to
      .agent/logs/{DATE}_02_Material_Writing.jsonl using EXTERNAL_TOOL_START/END events.

  - id: step_2_traceability_setup
    agent: "02_writer/A2_Traceability_Curator"
    action: "setup_tracking"
    depends_on: "step_1_source_mining"
    input: 
      - "3-Source Fact Packet"
      - "Source Materials"
      - "Output Language: Korean"
    output: "Traceability Packet (Initial)"

  - id: step_3_skeleton_design
    agent: "02_writer/A3_Curriculum_Architect"
    action: "create_skeleton"
    depends_on: "step_2_traceability_setup"
    input: 
      - "3-Source Fact Packet"
      - "강의구성안 (세션 목록)"
      - "Output Language: Korean"
    output: "Skeleton Packet (per session)"

  # Phase 2: 세션별 순차 직접 집필
  - id: step_4_session_writing
    agent: "02_writer/A4B_Session_Writer"
    action: "write_session_material"
    depends_on: "step_3_skeleton_design"
    execution_mode: "sequential_direct"  # 순차 직접 집필 — task() 재위임 절대 금지
    pair_size: 2  # 2개 세션을 연속 집필 (연속성 확보)
    input: 
      - "Session Spec (from 강의구성안) — 📚 참고자료 매핑 섹션 포함"
      - "Skeleton Packet"
      - "3-Source Fact Packet (세션별 통합 팩트)"
      - "Traceability Packet"
      - "Output Language: Korean"
    output: "Pair Material Files (02_Material/pairs/Day{N}_{AM|PM}_Part{P}_{주제}.md)"
    notes: |
      🎯 핵심: 각 세션(50분)을 개별 파일로 집필. 2개 세션 단위 순차 처리.
      ⚠️ task() 재위임 절대 금지 — Write 도구로 직접 파일 저장
      📐 필수 구조: A0이 정의한 청크 타입별 4~7섹션 구조를 준수
        - lab/code 청크: §1~§7 전부 필수
        - narrative/diagram 청크: §1개요, §2핵심개념, §3상세내용, §6요약 필수 + §4/§5/§7 해당 시
      📝 출력 규칙:
        - 분량 제한 없음. 교육적 완결성이 최우선
        - 서술형 긴 줄글 (개조식 요약 금지)
        - 친근한 구어체 (~해요, ~입니다)
        - 🗣️ 강사 대본 + 🎙️ 실습 가이드 포함
        - 비유 및 스토리텔링 ('AI 시대의 서사' 톤)
        - 표 허용: 실습 가이드 표, 비교 표, 요약 표 적극 활용
      📚 참고자료 활용 규칙:
        - 세션 명세서의 📚 참고자료 매핑 섹션을 반드시 확인
        - 3-Source 팩트 패킷의 local_excerpt, notebooklm, deep_research 모두 반영
        - 3개 소스에 없는 내용만 자체 생성 (출처 명시)
        - 💡 강사 노트에 참고자료 출처 표기
      🔄 기존 세션 파일이 있으면 입력으로 활용하여 청크 타입별 섹션 구조로 확장
      📁 산출물: 02_Material/sessions/세션-{번호:03d}-{제목}_v1.0.md
      ⚠️ 각 세션은 독립적으로 완결성을 가져야 함 (중간에 끊기지 않음)
      📖 3-Layer 콘텐츠 규칙 (MANDATORY):
        - 모든 §2, §3 섹션은 반드시 📖 교안 본문(설명체)을 먼저 작성한 후 🗣️ 강사 대본(구어체)을 추가
        - 교안 본문 : 강사 대본 분량 비율 = 6:4 이상 (본문이 주, 대본이 종)
        - 대본만 있고 본문이 없는 섹션은 불완전 산출물로 판정
        - 교안 본문 어조: 설명체 (~입니다, ~됩니다) / 강사 대본 어조: 구어체 (~해요, ~거예요)

  # Phase 3: pair_merge + merge_review
  - id: step_5a_pair_merge
    script: ".agent/scripts/aggregate_material.py"
    agent: "script/aggregate_material"
    category: "task-localization"
    action: "pair_merge"
    depends_on: "step_4_session_writing"
    input:
      - "Pair Material Files (02_Material/pairs/Day*_Part*.md)"
      - "Day-Session 경계표 (강의구성안 기반)"
    output: "AM/PM Merged Files (02_Material/Day{N}_{AM|PM}_{주제}.md)"
    notes: |
      🤖 스크립트 자동화: LLM 호출 없이 기계적 연결 수행
      🎯 핵심: pairs/ 내 Part 파일을 (day, period) 그룹별로 연결하여 Day AM/PM 파일 생성
      📁 산출물: 02_Material/Day{N}_{AM|PM}_{주제}.md

  - id: step_5b_merge_review
    agent: "02_writer/A4C_Material_Aggregator"
    action: "merge_review"
    depends_on: "step_5a_pair_merge"
    input:
      - "AM/PM Merged Files (02_Material/Day{N}_{AM|PM}_{주제}.md)"
      - "강의구성안 (01_Planning/강의구성안.md)"
    output: "Quality-Enhanced AM/PM Files"
    notes: |
      🧠 LLM 머지 품질 보강 (step_5b): 스크립트 머지 결과의 품질 향상
      🎯 핵심: Part 경계 전환 문단 삽입, 브릿지 노트 강화, 용어 통일
      ⚠️ 본문 내용 수정/요약/삭제 금지 — 연결 품질만 보강
      📁 산출물: 02_Material/Day{N}_{AM|PM}_{주제}.md (in-place 보강)

  # Phase 4: 취합 및 통합
  - id: step_6_aggregation
    script: ".agent/scripts/aggregate_material.py"
    agent: "script/aggregate_material"
    category: "task-localization"
    action: "aggregate"
    depends_on: "step_5b_merge_review"
    input: 
      - "All Session Materials"
      - "AM/PM Split Files"
      - "강의구성안 (의존성 그래프, 메타데이터)"
    output: "Aggregated Material Draft (02_Material/강의교안_v2.1.md)"
    notes: |
      🤖 스크립트 자동화: LLM 호출 없이 기계적 취합 수행
      🎯 핵심: 세션 파일 정렬 → 메타데이터 추출 → 목차 생성 → 본문 연결 → 부록 템플릿
      📋 최종 구조:
        - 헤더 및 메타데이터
        - 목차 및 네비게이션
        - 개별 세션 내용 통합
        - 부록 (키워드 인덱스, 로드맵 템플릿, 강사 체크리스트)
      📁 산출물: 02_Material/강의교안_v2.1.md

  # Phase 5: 최종 QA
  - id: step_7_final_qa
    agent: "02_writer/A8_QA_Editor"
    action: "quality_assurance_v2"
    depends_on: "step_6_aggregation"
    input: 
      - "Aggregated Material (v2.1)"
      - "3-Source Fact Packet"
      - "Traceability Packet"
      - "Output Language: Korean"
    output: "QA Report & Final Material"
    qa_criteria:
      - "5대 원칙: 완전성, 명확성, 재현성, 추적성, 원본유지"
      - "세션별 독립성 + 전체 일관성"
      - "브릿지 노트 적절성"
      - "용어 및 비유 일관성"
      - "난이독 곡선 부드러움"
      - "시각화 적절성 (표/다이어그램)"
      - "참고자료 활용독: 📚 참고자료 매핑 대비 실제 반영률 70% 이상"
      - "3-Source 교차 검증: 팩트 패킷의 3개 소스가 교안에 균형 있게 반영"
      - "청크 타입별 4~7섹션 구조 준수 검증"
      - "AM/PM 분할 정합성: Day-Session 경계표 기반 분할이 정확한지 검증"
    decision:
      approved: "Finish"
      rejected: "Go to step_4_session_writing"
  # (step_12/step_13 삭제됨 — step_5a/step_6으로 통합)

# ── 모델 라우팅 (정본: .agent/AGENTS.md §Per-Agent Model Routing) ──────────────────────────────────────────
# 아래는 .agent/AGENTS.md의 P02 Writer 섹션과 동기화된 참조입니다.
# 카테고리→모델 매핑은 .opencode/oh-my-opencode.jsonc의 categories 섹션을 참조합니다.
# 불일치 시 .agent/AGENTS.md가 우선합니다.
model_routing:
  _ssot: ".agent/AGENTS.md §Per-Agent Model Routing"
  default_category: "deep-production"  # P02 Writer 기본 카테고리
  overrides:
    A8_QA_Editor:
      category: "task-localization"
      note: "구어체 변환, 한국어 톤 비파괴 편집"
    A2_Traceability_Curator:
      category: "task-localization"
      note: "출처 추적 구축 — 1M context 구조화 매핑"
    A1_Source_Miner:
      category: "orchestration-core"
      note: "3-Source 수집 — 비정형 소스 뉴대 팩트 추출"
    A3_Curriculum_Architect:
      category: "orchestration-core"
      note: "골격 설계"

# ── 업스트림/다운스트림 연동 ──────────────────────────────────────────
upstream_integration:
  # 01_Lecture_Planning 연동
  lecture_planning:
    required_inputs:
      - "01_Planning/강의구성안.md"
    optional_inputs:
      - "01_Planning/Trend_Report.md"
      - "참고자료/ (로컬 참고자료 폴더 — 없을 수 있음)"
      - "NotebookLM URL (제공 시 필수 활용)"
    notes: |
      v6 워크플로우는 3-Source Mandatory 정송을 적용.
      강의구성안의 세션 구조를 기반으로 2개 세션 단위 순차 직접 집필을 수행하고,
      NotebookLM + 딥리서치를 독립 수집하여 세션별 3-Source 팩트 패킷 생성.
      task() 재위임 절대 금지 — A4B가 Write 돈구로 직접 파일 저장.

downstream_integration:
  # 03_Visualizer 연동
  visualizer:
    input_format: "session_based"
    session_files: "02_Material/sessions/세션-*.md"
    aggregated_material: "02_Material/강의교안_v2.1.md"
    
  # 04_Prompt_Generator 연동
  prompt_generator:
    input_format: "session_based"
    notes: |
      슬라이드 프롬프트 생성 시 세션별로 개별 프롬프트 파일 생성.
